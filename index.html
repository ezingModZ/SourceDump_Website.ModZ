<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModZ Dump_SourceWebsite</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-layer"></div>
    <div class="container">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <h1 class="logo-text">ModZ <span>Dump_SourceWebsite</span></h1>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-num" id="userCount">0</div>
                    <div class="stat-label">Lần sử dụng</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="bypassCount">0</div>
                    <div class="stat-label">Lần bỏ chặn CORS</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="avgTime">--</div>
                    <div class="stat-label">Thời gian TB</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="successRate">0%</div>
                    <div class="stat-label">Tỉ lệ thành công</div>
                </div>
            </div>
        </header>

        <section class="control-box">
            <div class="input-wrap">
                <label>Nhập danh sách URL cần lấy nguồn</label>
                <textarea id="urlInput" placeholder="Dán nhiều URL mỗi dòng 1 cái hoặc cả đoạn văn bản chứa link..."></textarea>
            </div>

            <div class="option-row">
                <label class="opt-check">
                    <input type="checkbox" id="autoProxy" checked>
                    <span>Tự động dùng Proxy bỏ chặn CORS</span>
                </label>
                <label class="opt-check">
                    <input type="checkbox" id="spoofInfo" checked>
                    <span>Giả mạo thông tin trình duyệt</span>
                </label>
                <label class="opt-check">
                    <input type="checkbox" id="retryFail" checked>
                    <span>Thử lại khi thất bại</span>
                </label>
                <div class="opt-select">
                    <span>Định dạng lưu:</span>
                    <select id="saveMode">
                        <option value="raw">Nguồn gốc</option>
                        <option value="html">Có ghi chú tiêu đề</option>
                    </select>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn main-btn" id="startBtn">🚀 Bắt đầu lấy nguồn</button>
                <button class="btn sub-btn" id="loadList">📂 Tải danh sách</button>
                <button class="btn sub-btn" id="saveList">💾 Lưu danh sách</button>
                <input type="file" id="filePick" accept=".txt" hidden>
            </div>
        </section>

        <section class="filter-bar">
            <div class="filter-btns">
                <button class="f-btn active" data-f="all">Tất cả (<span id="totalCount">0</span>)</button>
                <button class="f-btn" data-f="done">Thành công (<span id="doneCount">0</span>)</button>
                <button class="f-btn" data-f="fail">Thất bại (<span id="failCount">0</span>)</button>
                <button class="f-btn" data-f="pending">Chờ xử lý (<span id="pendingCount">0</span>)</button>
            </div>
            <div class="action-btns">
                <button class="btn small-btn" id="selAll">Chọn tất</button>
                <button class="btn small-btn danger" id="delFail">Xóa lỗi</button>
                <button class="btn small-btn" id="redoFail">Chạy lại lỗi</button>
                <button class="btn small-btn" id="resetAll">Xóa hết</button>
            </div>
        </section>

        <section class="list-section">
            <div id="queueList" class="item-list">
                <div class="empty-state">Chưa có URL nào được thêm vào</div>
            </div>
        </section>

        <section class="view-section">
            <div class="view-head">
                <h3>Nội dung nguồn</h3>
                <div class="view-actions">
                    <button class="btn small-btn" id="copyTxt">📋 Sao chép</button>
                    <button class="btn small-btn main-btn" id="packZip">📦 Tải toàn bộ ZIP</button>
                </div>
            </div>
            <pre id="codeView" class="code-display">-- Chọn mục để xem nội dung --</pre>
        </section>

        <div id="msgBox" class="msg-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="script.js"></script>
</body>
                      </html>
